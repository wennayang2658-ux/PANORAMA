  :root {
    --bg-color: #F1EFEB; 
    --text-primary: #111111; 
    --text-muted: #777777;
    --line-color: #111111;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;

  }

  .font-mono {
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', 'Courier Prime', monospace;
  }

  .font-sans {
    font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', sans-serif;
  }

  .filter-btn {
    position: relative;
    padding-bottom: 4px;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .filter-btn.active {
    color: var(--text-primary);
  }

  .filter-btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0%;
    height: 1px;
    background-color: var(--line-color);
    transition: width 0.3s ease;
  }

  .filter-btn.active::after, .filter-btn:hover::after {
    width: 100%;
  }

  .layout-grid {
    display: grid;
    grid-template-columns: 1fr;
    padding: 1rem;
    gap: 1.5rem;
    min-height: 100vh;
  }

  @media (min-width: 1024px) {
    .layout-grid {
      grid-template-columns: 80px 1fr 440px 80px;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 2rem;
      gap: 2rem;
      overflow: hidden;
    }
  }

  .header-nav {
    grid-column: 1 / -1;
  }
  @media (min-width: 1024px) {
    .header-nav {
      grid-column: 2 / 4;
      grid-row: 1 / 2;
    }
  }

  .scroll-sync-container {
    display: flex;
    flex-direction: column-reverse; 
    gap: 2rem;
  }
  @media (min-width: 1024px) {
    .scroll-sync-container {
      grid-column: 2 / 4;
      grid-row: 2 / 3;

      overflow-x: hidden;

    stroke-width: 0.5px;
    stroke-opacity: 0.2;

    stroke-opacity: 0.15;
    transition: all 0.3s ease;

    stroke: var(--line-color);

  }

  .project-marker {

  .project-marker-dot {

    stroke: var(--line-color);
    stroke-width: 2px;
    transition: all 0.3s ease;
  }
  .project-marker-ring {

    stroke: var(--line-color);
    stroke-width: 1px;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .project-marker.active .project-marker-dot,
  .project-marker:hover .project-marker-dot {

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .project-marker:hover .project-label,
  .project-marker.active .project-label {
    opacity: 1;
  }

  #project-details {
    opacity: 0.3;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #project-details.active {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(241, 239, 235, 0.95);
    backdrop-filter: blur(20px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .lightbox.active { opacity: 1; visibility: visible; }
  .lightbox-content {
    position: relative;
    max-width: 95vw;
    max-height: 80vh;
  }
  .lightbox-img {
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.1);
    transform: scale(0.9);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .lightbox.active .lightbox-img { transform: scale(1); }

  .lightbox-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 40px;
    height: 40px;
    background: transparent;
    border: 1px solid var(--line-color);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    color: var(--text-primary);
    z-index: 1010;
  }
  @media (min-width: 768px) {
    .lightbox-close { top: 2rem; right: 2rem; width: 48px; height: 48px; font-size: 14px; }
  }
  .lightbox-close:hover { background: var(--text-primary); color: var(--bg-color); }

  .lightbox-caption {
    position: absolute;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    width: 100%;
    text-align: center;
  }

  .lightbox-nav {
    position: absolute;
    bottom: 1rem; 
    width: 48px;
    height: 48px;
    background: transparent;
    border: 1px solid var(--line-color);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    color: var(--text-primary);
    z-index: 1010;
  }

  }

  .lightbox-prev { left: 1rem; }

  .lightbox-next { right: 1rem; }
  @media (min-width: 768px) { .lightbox-next { right: 2rem; } }
</style>
